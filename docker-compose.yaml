services:
  database1:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: testdb
      PGDATA: /data/postgres
    ports:
      - 5438:5432
    volumes:
      - db1:/data/postgres
    networks:
      - db

  database2:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: testdb
      PGDATA: /data/postgres
    ports:
      - 5437:5432
    volumes:
      - db2:/data/postgres
    networks:
      - db


networks:
  db:

volumes:
  db1:
  db2: